<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funny Proposal</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #ffe6f0;
        font-family: Arial, sans-serif;
    }

    .container {
        text-align: center;
    }

    h1 {
        font-size: 40px;
        color: #ff0066;
    }

    .btn {
        padding: 12px 30px;
        font-size: 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin: 20px;
        transition: 0.3s;
    }

    #yes {
        background: #00cc66;
        color: white;
    }

    #yes:hover {
        transform: scale(1.1);
    }

    #no {
        background: #ff3333;
        color: white;
        position: absolute;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Will you marry me? ❤️</h1>
    <button class="btn" id="yes" onclick="yesClicked()">Yes</button>
    <button class="btn" id="no">No</button>
</div>

<script>
    const noBtn = document.getElementById("no");

    // Move NO button when mouse comes near
    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    function yesClicked() {
        alert("Yayyyy ❤️😍");
    }
</script>

</body>
</html>
